# @package _global_

defaults:
  - override /model: cfm
  - override /dataset: triple_mixed
  - override /detector: mock_easy
  - override /transform: default_mock
  - _self_

experiment:
  name: cfm_mock_denoise
  description: Base experiment for training with ResNet on CFM using MOCK.

mode: TRAIN
predict: true
predict_best_only: true
save_samples: all

trainer:
  epochs: 800
  log_interval: 10
  val_interval: 10

model:
  hidden_dims: [512, 512, 512, 512, 512, 512]
  sigma: 0.0
  solver: dopri5
  network_type: resnet
  activation: silu
  norm: null
  time_embed_dim: 64
  learning_rate: 1e-4
  scheduler_patience: 50
  solver_atol: 1e-3
  solver_rtol: 1e-3
  metric_sample_size: 1000000
  conditional: true
  cond_embed_dim: 128

dataset:
  sample_num: 8000000
  batch_size: 20000
  paired: true
