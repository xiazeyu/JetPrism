# MC-POM detector: hard
# Heavy momentum smearing (σ=1.0) + tight cos(θ) cut (0.7) + k10 ≥ 0.3

defaults:
  - compose

detectors:
  - _target_: jetprism.detectors.MomentumSmearing
    sigma: 1.0
  - _target_: jetprism.detectors.CosThetaCut
    threshold: 0.7
  - _target_: jetprism.detectors.ValueCut
    column: 'k10'
    min_value: 0.3
    max_value: null
